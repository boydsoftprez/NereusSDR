name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re-)build, e.g. v0.2.0'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve tag and validate format
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "Tag: $TAG"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9.]+)?$ ]]; then
            echo "::error::Tag '$TAG' does not match vMAJOR.MINOR.PATCH[-suffix]"
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if [[ "$TAG" =~ -(alpha|beta|rc) ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify CMakeLists.txt version matches tag
        shell: bash
        run: |
          set -euo pipefail
          CMAKE_VER=$(grep -oE 'project\(NereusSDR VERSION [0-9]+\.[0-9]+\.[0-9]+' CMakeLists.txt | awk '{print $3}')
          TAG_VER="${{ steps.meta.outputs.version }}"
          BASE_VER="${TAG_VER%%-*}"
          if [[ "$CMAKE_VER" != "$BASE_VER" ]]; then
            echo "::error::CMakeLists.txt version ($CMAKE_VER) != tag version ($BASE_VER)"
            exit 1
          fi
          echo "Version match: $CMAKE_VER"

      - name: Extract release notes from CHANGELOG.md
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ steps.meta.outputs.version }}"
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {flag=1; next}
            flag && /^## \[/ {flag=0}
            flag {print}
          ' CHANGELOG.md > release_notes.md
          if [[ ! -s release_notes.md ]]; then
            echo "::error::No CHANGELOG.md section found for version $VERSION"
            exit 1
          fi
          echo "----- release notes -----"
          cat release_notes.md
          echo "-------------------------"

      - name: Append release-notes template
        shell: bash
        run: |
          if [[ -f .github/release-notes-template.md ]]; then
            echo "" >> release_notes.md
            cat .github/release-notes-template.md >> release_notes.md
          fi

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md
          retention-days: 1

  build-linux:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            arch: x86_64
            use_aqt: true
          - runner: ubuntu-24.04-arm
            arch: aarch64
            use_aqt: false
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config ccache \
            libgl1-mesa-dev libxkbcommon-dev libxkbcommon-x11-0 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 libxcb-shape0 \
            libxcb-render-util0 libxcb-xinerama0 libxcb-randr0 libxcb-xfixes0 \
            gstreamer1.0-plugins-base gstreamer1.0-plugins-good \
            gstreamer1.0-pulseaudio gstreamer1.0-gl \
            libgstreamer-gl1.0-0 libgstreamer-plugins-base1.0-0 \
            libfuse2 file desktop-file-utils \
            libfftw3-dev imagemagick \
            libasound2-dev libjack-jackd2-dev \
            libpipewire-0.3-dev

      - name: Install system Qt (ARM only)
        if: matrix.use_aqt == false
        run: |
          sudo apt-get install -y qt6-base-dev qt6-multimedia-dev \
            qt6-base-private-dev qt6-shadertools-dev qt6-svg-dev

      - name: Install Qt 6.8 via aqtinstall (x86_64)
        if: matrix.use_aqt == true
        run: |
          pip3 install aqtinstall
          # Qt 6.8+ folds qtsvg/qttools/qttranslations into qtbase; not listable as -m modules.
          aqt install-qt linux desktop 6.8.3 linux_gcc_64 \
            -m qtmultimedia qtshadertools \
            --outputdir ${{ github.workspace }}/Qt
          echo "Qt6_DIR=${{ github.workspace }}/Qt/6.8.3/gcc_64/lib/cmake/Qt6" >> $GITHUB_ENV
          echo "CMAKE_PREFIX_PATH=${{ github.workspace }}/Qt/6.8.3/gcc_64" >> $GITHUB_ENV
          echo "PATH=${{ github.workspace }}/Qt/6.8.3/gcc_64/bin:$PATH" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=${{ github.workspace }}/Qt/6.8.3/gcc_64/lib:$LD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up DeepFilterNet3 library
        run: bash setup-deepfilter.sh

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: release-ccache-linux-${{ matrix.arch }}-${{ needs.prepare.outputs.tag }}
          restore-keys: |
            release-ccache-linux-${{ matrix.arch }}-

      - name: Configure
        run: |
          ccache --max-size=2G
          CMAKE_EXTRA=""
          if [ "${{ matrix.use_aqt }}" = "true" ]; then
            CMAKE_EXTRA="-DCMAKE_PREFIX_PATH=${{ github.workspace }}/Qt/6.8.3/gcc_64"
          else
            # Ubuntu 24.04 ARM ships Qt 6.4.2; QRhiWidget requires 6.7+.
            # Mirror ci.yml linux-gcc: CPU-only spectrum on this runner.
            CMAKE_EXTRA="-DNEREUS_GPU_SPECTRUM=OFF"
          fi
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            $CMAKE_EXTRA

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --no-tests=ignore

      - name: Install to AppDir
        run: |
          DESTDIR=${{ github.workspace }}/AppDir cmake --install build

      - name: Download linuxdeploy + Qt plugin
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${{ matrix.arch }}.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-${{ matrix.arch }}.AppImage
          chmod +x linuxdeploy-${{ matrix.arch }}.AppImage linuxdeploy-plugin-qt-${{ matrix.arch }}.AppImage

      - name: Bundle models and license files into AppDir
        run: |
          # rnnoise models
          mkdir -p AppDir/usr/share/NereusSDR/models/rnnoise
          cp third_party/rnnoise/models/Default_large.bin  AppDir/usr/share/NereusSDR/models/rnnoise/
          cp third_party/rnnoise/models/Default_small.bin  AppDir/usr/share/NereusSDR/models/rnnoise/
          # DeepFilterNet3 ONNX tarball
          mkdir -p AppDir/usr/share/NereusSDR/models/dfnet3
          cp third_party/deepfilter/models/DeepFilterNet3_onnx.tar.gz AppDir/usr/share/NereusSDR/models/dfnet3/
          # License files — DFNR (Apache-2.0 + MIT) and rnnoise (BSD)
          mkdir -p AppDir/usr/share/doc/NereusSDR/deepfilter
          cp third_party/deepfilter/LICENSE       AppDir/usr/share/doc/NereusSDR/deepfilter/
          cp third_party/deepfilter/LICENSE-APACHE AppDir/usr/share/doc/NereusSDR/deepfilter/
          cp third_party/deepfilter/LICENSE-MIT   AppDir/usr/share/doc/NereusSDR/deepfilter/
          cp third_party/deepfilter/COMMIT        AppDir/usr/share/doc/NereusSDR/deepfilter/
          mkdir -p AppDir/usr/share/doc/NereusSDR/rnnoise
          cp third_party/rnnoise/LICENSE          AppDir/usr/share/doc/NereusSDR/rnnoise/

      - name: Build AppImage
        env:
          LDAI_OUTPUT: NereusSDR-${{ needs.prepare.outputs.version }}-${{ matrix.arch }}.AppImage
          QT_SELECT: qt6
          EXTRA_QT_PLUGINS: multimedia
        run: |
          if [ "${{ matrix.use_aqt }}" = "true" ]; then
            export QMAKE=${{ github.workspace }}/Qt/6.8.3/gcc_64/bin/qmake
          else
            export QMAKE=$(which qmake6 2>/dev/null || which qmake)
          fi
          mkdir -p AppDir/usr/share/applications
          cat > AppDir/usr/share/applications/NereusSDR.desktop << 'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=NereusSDR
          Exec=NereusSDR
          Icon=nereussdr
          Categories=HamRadio;Audio;
          Comment=Cross-platform OpenHPSDR SDR Console (GPLv3 port of Thetis / mi0bot / FlexRadio PowerSDR lineage)
          DESKTOP
          # Install the real NereusSDR icon at standard hicolor sizes.
          # Uses the pre-rendered PNGs from resources/icons/NereusSDR.iconset/
          # so there is no image-processing dependency on the runner (the
          # previous implementation called `convert` and fell back to `touch`,
          # which either produced a placeholder "NSDR" text bitmap or a
          # zero-byte file — neither is a usable icon). linuxdeploy creates
          # the top-level .DirIcon symlink automatically based on the
          # .desktop file's `Icon=nereussdr` field, so file managers will
          # thumbnail the AppImage correctly.
          for size in 16 32 64 128 256 512; do
            mkdir -p AppDir/usr/share/icons/hicolor/${size}x${size}/apps
          done
          cp resources/icons/NereusSDR.iconset/icon_16x16.png     AppDir/usr/share/icons/hicolor/16x16/apps/nereussdr.png
          cp resources/icons/NereusSDR.iconset/icon_32x32.png     AppDir/usr/share/icons/hicolor/32x32/apps/nereussdr.png
          cp resources/icons/NereusSDR.iconset/icon_32x32@2x.png  AppDir/usr/share/icons/hicolor/64x64/apps/nereussdr.png
          cp resources/icons/NereusSDR.iconset/icon_128x128.png   AppDir/usr/share/icons/hicolor/128x128/apps/nereussdr.png
          cp resources/icons/NereusSDR.iconset/icon_256x256.png   AppDir/usr/share/icons/hicolor/256x256/apps/nereussdr.png
          cp resources/icons/NereusSDR.iconset/icon_512x512.png   AppDir/usr/share/icons/hicolor/512x512/apps/nereussdr.png

          ./linuxdeploy-${{ matrix.arch }}.AppImage \
            --appdir AppDir \
            --plugin qt \
            --desktop-file AppDir/usr/share/applications/NereusSDR.desktop \
            --output appimage

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: NereusSDR-*.AppImage
          retention-days: 7

  build-macos:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            dmg_suffix: macOS-apple-silicon
            deployment_target: "14.0"
          # Intel Mac restored 2026-05-03 via cross-compile from the abundant
          # Apple Silicon runner. Native macos-13 was unviable: original Phase
          # 3N attempt failed on label rejection (2026-04-12); re-attempt found
          # the runner pool effectively empty (queue waits >13 min with no
          # allocation as Apple deprecates Intel CI). Cross-compile path uses
          # aqtinstall for Qt, FFTW from source, and Rust target
          # x86_64-apple-darwin. ctest runs via Rosetta on the arm64 host.
          - runner: macos-15
            arch: x86_64
            dmg_suffix: macOS-intel
            deployment_target: "11.0"
    runs-on: ${{ matrix.runner }}
    # Capture the Apple Developer ID secret into a job-level env var so
    # step-level `if:` guards can evaluate it. GitHub Actions forbids
    # `secrets.*` directly in step-level `if:` expressions — they're
    # evaluated at workflow-parse time before secrets inject. Job-level
    # env is populated after secrets are available.
    env:
      HAS_APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Install dependencies (arm64 native)
        if: matrix.arch == 'arm64'
        run: brew install qt@6 ninja create-dmg fftw ccache

      - name: Install non-Qt brew packages (x86_64 cross-compile)
        if: matrix.arch == 'x86_64'
        run: brew install ninja create-dmg ccache

      - name: Install Qt 6.8 for x86_64 macOS via aqtinstall
        if: matrix.arch == 'x86_64'
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'mac'
          target: 'desktop'
          arch: 'clang_64'
          modules: 'qtmultimedia qtshadertools'
          cache: true

      - name: Build FFTW from source for x86_64 (both precisions)
        if: matrix.arch == 'x86_64'
        run: |
          # NereusSDR needs both libfftw3 (double, for libspecbleach + WDSP)
          # and libfftw3f (single, for FFTEngine). FFTW autotools forces one
          # precision per configure run, so we run install twice into the
          # same prefix.
          PREFIX="${{ github.workspace }}/fftw-x86_64"
          CFLAGS="-arch x86_64 -mmacosx-version-min=${{ matrix.deployment_target }}"
          curl -fsSL https://fftw.org/pub/fftw/fftw-3.3.10.tar.gz -o fftw.tar.gz
          tar xzf fftw.tar.gz
          cd fftw-3.3.10

          # Pass 1 — double precision (libfftw3)
          ./configure --enable-shared --disable-doc \
            --prefix="$PREFIX" CFLAGS="$CFLAGS" --host=x86_64-apple-darwin
          make -j$(sysctl -n hw.ncpu)
          make install
          make distclean

          # Pass 2 — single precision (libfftw3f)
          ./configure --enable-single --enable-shared --disable-doc \
            --prefix="$PREFIX" CFLAGS="$CFLAGS" --host=x86_64-apple-darwin
          make -j$(sysctl -n hw.ncpu)
          make install

          # Sanity-check both precisions installed
          test -f "$PREFIX/include/fftw3.h"            || { echo "::error::fftw3.h not installed"; exit 1; }
          test -f "$PREFIX/lib/pkgconfig/fftw3.pc"     || { echo "::error::fftw3.pc not installed"; exit 1; }
          test -f "$PREFIX/lib/pkgconfig/fftw3f.pc"    || { echo "::error::fftw3f.pc not installed"; exit 1; }
          test -f "$PREFIX/lib/libfftw3.dylib"         || { echo "::error::libfftw3 (double) not installed"; exit 1; }
          test -f "$PREFIX/lib/libfftw3f.dylib"        || { echo "::error::libfftw3f (single) not installed"; exit 1; }

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Add the cross-compile target on the Intel matrix row so DFNR
          # builds for x86_64; leave native arm64 to default host triple.
          targets: ${{ matrix.arch == 'x86_64' && 'x86_64-apple-darwin' || '' }}

      # Import Apple Developer ID certs into a temporary keychain so
      # codesign / productbuild can find them. Gated on the secret being
      # present so dev builds without secrets still complete (they fall
      # back to ad-hoc codesign in the "Codesign app" step below).
      - name: Import Apple certs
        if: env.HAS_APPLE_DEVELOPER_ID == 'true'
        env:
          APPLE_CERT_P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          APPLE_CERT_P12_PASSWORD: ${{ secrets.APPLE_CERT_P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD=$(openssl rand -base64 24)
          P12_PATH="$RUNNER_TEMP/certs.p12"

          echo -n "$APPLE_CERT_P12_BASE64" | base64 --decode > "$P12_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$P12_PATH" \
            -P "$APPLE_CERT_P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          # Add temp keychain to the search list so codesign finds the certs
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          # Allow codesign / productbuild to use the keys without prompts
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign:,productbuild: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Verify both identities are visible
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

          rm "$P12_PATH"

      - name: Set up DeepFilterNet3 library
        env:
          # Coerces setup-deepfilter.sh to build for the matrix arch instead
          # of the host arch (uname -m). Without this the cross-compile row
          # would build aarch64 DFNR and the link step would fail.
          NEREUS_TARGET_ARCH: ${{ matrix.arch }}
        run: bash setup-deepfilter.sh

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/ccache
          key: release-ccache-macos-${{ matrix.arch }}-${{ needs.prepare.outputs.tag }}
          restore-keys: |
            release-ccache-macos-${{ matrix.arch }}-

      - name: Configure
        run: |
          ccache --max-size=2G
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            # Cross-compile path: FFTW comes from our source build at
            # ${{ github.workspace }}/fftw-x86_64. PKG_CONFIG_PATH lets
            # NereusSDR's pkg_check_modules(FFTW3 fftw3) find it; LDFLAGS
            # adds -L so the linker resolves -lfftw3 (NereusSDR's
            # third_party CMakeLists.txt files only call
            # target_link_libraries, not target_link_directories — brew's
            # /opt/homebrew/lib is in the default linker path on the arm64
            # row, our cross-compile prefix is not). Qt is installed by
            # jurplel/install-qt-action and exposed via Qt6_DIR env.
            FFTW_PREFIX="${{ github.workspace }}/fftw-x86_64"
            export PKG_CONFIG_PATH="$FFTW_PREFIX/lib/pkgconfig:$PKG_CONFIG_PATH"
            export LDFLAGS="-L$FFTW_PREFIX/lib $LDFLAGS"
            CMAKE_PREFIX_PATH_VAL="$FFTW_PREFIX"
          else
            # Native path: brew supplies both Qt and FFTW under the brew
            # prefix (/opt/homebrew on Apple Silicon). No env-var dance
            # needed because brew's lib dir is in the default search path.
            CMAKE_PREFIX_PATH_VAL="$(brew --prefix)"
          fi
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${{ matrix.deployment_target }}" \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch }}" \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH_VAL" \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Test
        working-directory: build
        run: ctest --output-on-failure --no-tests=ignore

      - name: Bundle Qt frameworks
        run: |
          # macdeployqt comes from brew on the arm64 row, from aqtinstall on
          # the x86_64 row. jurplel/install-qt-action exposes the install via
          # QT_ROOT_DIR.
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            MACDEPLOYQT="$QT_ROOT_DIR/bin/macdeployqt"
          else
            MACDEPLOYQT="$(brew --prefix qt@6)/bin/macdeployqt"
          fi
          "$MACDEPLOYQT" build/NereusSDR.app -verbose=1 -always-overwrite

      - name: Copy license notices into app bundle
        run: |
          mkdir -p build/NereusSDR.app/Contents/Resources/licenses
          cp -r packaging/third-party-licenses/. build/NereusSDR.app/Contents/Resources/licenses/
          cp LICENSE LICENSE-DUAL-LICENSING build/NereusSDR.app/Contents/Resources/licenses/
          # DFNR (Apache-2.0 + MIT) and rnnoise (BSD) license files
          mkdir -p build/NereusSDR.app/Contents/Resources/licenses/deepfilter
          cp third_party/deepfilter/LICENSE       build/NereusSDR.app/Contents/Resources/licenses/deepfilter/
          cp third_party/deepfilter/LICENSE-APACHE build/NereusSDR.app/Contents/Resources/licenses/deepfilter/
          cp third_party/deepfilter/LICENSE-MIT   build/NereusSDR.app/Contents/Resources/licenses/deepfilter/
          cp third_party/deepfilter/COMMIT        build/NereusSDR.app/Contents/Resources/licenses/deepfilter/
          mkdir -p build/NereusSDR.app/Contents/Resources/licenses/rnnoise
          cp third_party/rnnoise/LICENSE          build/NereusSDR.app/Contents/Resources/licenses/rnnoise/

      - name: Bundle models into app bundle
        run: |
          # rnnoise models
          mkdir -p build/NereusSDR.app/Contents/Resources/models/rnnoise
          cp third_party/rnnoise/models/Default_large.bin  build/NereusSDR.app/Contents/Resources/models/rnnoise/
          cp third_party/rnnoise/models/Default_small.bin  build/NereusSDR.app/Contents/Resources/models/rnnoise/
          # DeepFilterNet3 ONNX tarball
          mkdir -p build/NereusSDR.app/Contents/Resources/models/dfnet3
          cp third_party/deepfilter/models/DeepFilterNet3_onnx.tar.gz build/NereusSDR.app/Contents/Resources/models/dfnet3/

      # Sign the .app bundle. With APPLE_DEVELOPER_ID set we use Developer
      # ID + hardened runtime + entitlements (required for notarization).
      # Without secrets we fall back to ad-hoc so dev builds still work.
      - name: Codesign app
        run: |
          if [ "$HAS_APPLE_DEVELOPER_ID" = "true" ]; then
            codesign --force --deep --options runtime --timestamp \
              --entitlements packaging/macos/app-entitlements.plist \
              --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
              build/NereusSDR.app
          else
            codesign --force --deep --sign - build/NereusSDR.app
          fi
          codesign --verify --verbose=2 build/NereusSDR.app

      - name: Build HAL plugin
        run: |
          # Thread the matrix arch + deployment target through so the HAL
          # plugin matches the host app bundle on both rows.
          cmake -B build-hal -S hal-plugin -DCMAKE_BUILD_TYPE=RelWithDebInfo \
            -DCMAKE_OSX_ARCHITECTURES="${{ matrix.arch }}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET="${{ matrix.deployment_target }}"
          cmake --build build-hal

      - name: Sign HAL plugin
        if: env.HAS_APPLE_DEVELOPER_ID == 'true'
        run: |
          codesign --force --options runtime --timestamp \
            --entitlements packaging/macos/hal-entitlements.plist \
            --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
            build-hal/NereusSDRVAX.driver

      - name: Build .pkg
        env:
          APPLE_INSTALLER_ID: ${{ secrets.APPLE_INSTALLER_ID }}
          # Pass the FULL tag version (including any -rcN / -alpha / -beta
          # suffix) so productbuild writes the correctly-suffixed PKG at
          # the same path the notarize/staple/upload steps below expect.
          # CMakeLists.txt VERSION can only carry the numeric base, so the
          # packaging script's CMake-parse fallback would otherwise drop
          # the suffix and break pre-release builds.
          VERSION: ${{ needs.prepare.outputs.version }}
          # PKG_SUFFIX selects the arch-tagged segment of the PKG filename
          # so the two matrix rows do not collide in the staging step
          # below. Mirrors the DMG dmg_suffix convention.
          PKG_SUFFIX: ${{ matrix.dmg_suffix }}
        run: bash packaging/macos/hal-installer.sh

      - name: Notarize .pkg
        if: env.HAS_APPLE_DEVELOPER_ID == 'true'
        run: |
          xcrun notarytool submit \
            build/NereusSDR-${{ needs.prepare.outputs.version }}-${{ matrix.dmg_suffix }}.pkg \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --wait

      - name: Staple .pkg
        if: env.HAS_APPLE_DEVELOPER_ID == 'true'
        run: |
          xcrun stapler staple \
            build/NereusSDR-${{ needs.prepare.outputs.version }}-${{ matrix.dmg_suffix }}.pkg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "NereusSDR" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "NereusSDR.app" 150 110 \
            --hide-extension "NereusSDR.app" \
            --app-drop-link 450 110 \
            "NereusSDR-${{ needs.prepare.outputs.version }}-${{ matrix.dmg_suffix }}.dmg" \
            "build/NereusSDR.app" \
          || true
          ls -la NereusSDR-*.dmg

      - name: Codesign DMG
        if: env.HAS_APPLE_DEVELOPER_ID == 'true'
        run: |
          DMG_PATH=$(ls NereusSDR-*.dmg | head -1)
          codesign --force --timestamp \
            --sign "${{ secrets.APPLE_DEVELOPER_ID }}" \
            "$DMG_PATH"

      - name: Notarize DMG
        if: env.HAS_APPLE_DEVELOPER_ID == 'true'
        run: |
          DMG_PATH=$(ls NereusSDR-*.dmg | head -1)
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_PASSWORD }}" \
            --wait

      - name: Staple DMG
        if: env.HAS_APPLE_DEVELOPER_ID == 'true'
        run: |
          DMG_PATH=$(ls NereusSDR-*.dmg | head -1)
          xcrun stapler staple "$DMG_PATH"

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-hal-pkg-${{ matrix.arch }}
          path: build/NereusSDR-*.pkg
          retention-days: 7

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: NereusSDR-*.dmg
          retention-days: 7

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Qt6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          # Qt 6.8+ folds qtsvg into qtbase; not listable as a separate module.
          modules: 'qtmultimedia qtserialport qtwebsockets qtshadertools'
          cache: true

      - name: Install Ninja and NSIS
        run: |
          choco install ninja -y
          choco install nsis -y

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Set up DeepFilterNet3 library
        shell: pwsh
        run: pwsh -File setup-deepfilter.ps1

      # sccache intentionally not used on Windows — see ci.yml for the
      # explanation. Qt is already cached via install-qt-action.

      - name: Setup FFTW3
        shell: pwsh
        run: |
          $fftw_dir = "third_party/fftw3"
          New-Item -ItemType Directory -Force -Path "$fftw_dir/include", "$fftw_dir/lib", "$fftw_dir/bin"
          Invoke-WebRequest -Uri "https://fftw.org/pub/fftw/fftw-3.3.5-dll64.zip" -OutFile fftw.zip
          Expand-Archive -Path fftw.zip -DestinationPath fftw-tmp
          Copy-Item fftw-tmp/fftw3.h "$fftw_dir/include/"
          Copy-Item fftw-tmp/libfftw3-3.dll "$fftw_dir/bin/"
          cd fftw-tmp
          lib /def:libfftw3-3.def /out:fftw3.lib /machine:x64
          cd ..
          Copy-Item fftw-tmp/fftw3.lib "$fftw_dir/lib/"

      - name: Configure
        shell: bash
        run: |
          # -DNEREUS_GPU_SPECTRUM=ON is explicit so CMake's FATAL_ERROR
          # fires at configure time if the Qt install is missing the
          # ShaderTools or Gui private modules. v0.1.1 silently shipped
          # without GPU spectrum because this flag was implicit; never
          # again.
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DNEREUS_GPU_SPECTRUM=ON

      - name: Build
        shell: bash
        run: cmake --build build -j${NUMBER_OF_PROCESSORS}

      - name: Test
        working-directory: build
        shell: bash
        run: ctest --output-on-failure --no-tests=ignore

      - name: Deploy Qt
        shell: pwsh
        run: |
          mkdir deploy
          copy build\NereusSDR.exe deploy\
          windeployqt deploy\NereusSDR.exe --release --no-translations --no-system-d3d-compiler
          if (Test-Path "third_party\fftw3\bin\libfftw3-3.dll") {
            copy third_party\fftw3\bin\libfftw3-3.dll deploy\
          }
          # libfftw3f-3.dll (single-precision) is the one FFTEngine actually
          # imports — committed in-tree at third_party/fftw3/bin/. windeployqt
          # only resolves Qt DLLs, so this non-Qt dependency must be staged
          # by hand or the .exe fails to start on clean installs with
          # "libfftw3f-3.dll was not found" (shipped broken in v0.1.2).
          if (Test-Path "third_party\fftw3\bin\libfftw3f-3.dll") {
            copy third_party\fftw3\bin\libfftw3f-3.dll deploy\
          } else {
            Write-Error "libfftw3f-3.dll missing from third_party\fftw3\bin\ — Windows artifact would ship broken"
            exit 1
          }
          # deepfilter.dll — Rust DFNR runtime (windeployqt only handles Qt DLLs;
          # this non-Qt dependency must be staged by hand or the .exe fails to
          # start with "deepfilter.dll was not found").
          $dfnrDll = "third_party\deepfilter\lib\windows-x86_64\deepfilter.dll"
          if (Test-Path $dfnrDll) {
            Copy-Item $dfnrDll deploy\
          } else {
            Write-Error "deepfilter.dll missing from third_party\deepfilter\lib\windows-x86_64\ — Windows artifact would ship broken (DFNR will crash at load)"
            exit 1
          }
          # Copy third-party license notices + both root license files
          # (LICENSE and LICENSE-DUAL-LICENSING) into the portable deploy
          # tree so both the ZIP and the NSIS installer pick them up.
          Copy-Item -Recurse packaging\third-party-licenses deploy\licenses
          Copy-Item LICENSE deploy\licenses\
          Copy-Item LICENSE-DUAL-LICENSING deploy\licenses\
          # DFNR (Apache-2.0 + MIT) and rnnoise (BSD) license files
          New-Item -ItemType Directory -Force -Path deploy\licenses\deepfilter | Out-Null
          Copy-Item third_party\deepfilter\LICENSE        deploy\licenses\deepfilter\
          Copy-Item third_party\deepfilter\LICENSE-APACHE deploy\licenses\deepfilter\
          Copy-Item third_party\deepfilter\LICENSE-MIT    deploy\licenses\deepfilter\
          Copy-Item third_party\deepfilter\COMMIT         deploy\licenses\deepfilter\
          New-Item -ItemType Directory -Force -Path deploy\licenses\rnnoise | Out-Null
          Copy-Item third_party\rnnoise\LICENSE           deploy\licenses\rnnoise\
          # rnnoise models
          New-Item -ItemType Directory -Force -Path deploy\models\rnnoise | Out-Null
          Copy-Item third_party\rnnoise\models\Default_large.bin deploy\models\rnnoise\
          Copy-Item third_party\rnnoise\models\Default_small.bin deploy\models\rnnoise\
          # DeepFilterNet3 ONNX tarball
          New-Item -ItemType Directory -Force -Path deploy\models\dfnet3 | Out-Null
          Copy-Item third_party\deepfilter\models\DeepFilterNet3_onnx.tar.gz deploy\models\dfnet3\

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $name = "NereusSDR-${{ needs.prepare.outputs.version }}-Windows-x64-portable.zip"
          Compress-Archive -Path deploy\* -DestinationPath $name

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $version = "${{ needs.prepare.outputs.version }}"
          # Strip any prerelease suffix (e.g. 0.1.0-alpha -> 0.1.0) for VIProductVersion,
          # which NSIS requires to be exactly 4 numeric dot-separated components.
          $versionNumeric = $version -replace '-.*$', ''
          $deploy  = (Resolve-Path deploy).Path
          # NSIS resolves a relative OutFile against the .nsi file's directory,
          # not the invocation CWD. Pass an absolute path so the installer
          # lands in the repo root where the upload-artifact glob finds it.
          $repoRoot = (Resolve-Path .).Path
          $outfile  = Join-Path $repoRoot "NereusSDR-$version-Windows-x64-setup.exe"
          & "C:\Program Files (x86)\NSIS\makensis.exe" `
              /DNSDR_VERSION=$version `
              /DNSDR_VERSION_NUMERIC=$versionNumeric `
              /DNSDR_DEPLOYDIR=$deploy `
              /DNSDR_OUTFILE=$outfile `
              scripts\windows\installer.nsi
          if (-not (Test-Path $outfile)) {
            Write-Error "NSIS did not produce $outfile"
            exit 1
          }
          Get-Item $outfile

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: |
            NereusSDR-*.zip
            NereusSDR-*-setup.exe
          retention-days: 7

  sign-and-publish:
    needs: [prepare, build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: downloaded

      - name: Stage artifacts
        run: |
          mkdir -p artifacts
          find downloaded -type f \( \
            -name '*.AppImage' -o \
            -name '*.dmg' -o \
            -name '*.pkg' -o \
            -name '*.zip' -o \
            -name '*-setup.exe' -o \
            -name 'release_notes.md' \
          \) -exec cp {} artifacts/ \;
          ls -la artifacts/

      - name: Generate source tarball
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          git archive --format=tar.gz \
            --prefix="NereusSDR-${VERSION}/" \
            "${TAG}" > "artifacts/NereusSDR-${VERSION}-source.tar.gz"

      - name: Fetch FFTW3 corresponding source (GPLv2 §3 / GPLv3 §6)
        # The Windows installer + portable ZIP bundle a prebuilt
        # libfftw3f-3.dll. FFTW is GPLv2-or-later, so the binary
        # distribution must be accompanied by the corresponding source on
        # the same medium (a GitHub Release IS the medium). Ship the exact
        # upstream source archive used to build the bundled DLL alongside
        # the installer artifacts so recipients receive both atomically.
        run: |
          curl -fsSL "https://fftw.org/pub/fftw/fftw-3.3.5.tar.gz" \
            -o "artifacts/fftw-3.3.5.tar.gz"
          ls -la artifacts/fftw-3.3.5.tar.gz

      - name: Generate SHA256SUMS
        working-directory: artifacts
        run: |
          # exclude release_notes.md from sums (not a release artifact)
          sha256sum $(ls | grep -v '^release_notes.md$') > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEY_FP=$(gpg --list-secret-keys --with-colons | awk -F: '/^fpr/ {print $10; exit}')
          echo "${KEY_FP}:6:" | gpg --import-ownertrust
          gpg --list-secret-keys

      - name: Sign artifacts
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        working-directory: artifacts
        run: |
          for f in *.AppImage *.dmg *.pkg *.zip *.exe *.tar.gz SHA256SUMS.txt; do
            [ -f "$f" ] || continue
            gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --detach-sign --armor "$f"
          done
          ls -la

      - name: Create draft GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TAG="${{ needs.prepare.outputs.tag }}"
          PRERELEASE_FLAG=""
          if [[ "${{ needs.prepare.outputs.is_prerelease }}" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          # Delete existing draft for this tag if rerunning
          gh release delete "$TAG" --yes --cleanup-tag=false 2>/dev/null || true
          gh release create "$TAG" \
            --title "NereusSDR ${VERSION}" \
            --notes-file artifacts/release_notes.md \
            --draft \
            $PRERELEASE_FLAG \
            artifacts/*.AppImage \
            artifacts/*.dmg \
            artifacts/*.pkg \
            artifacts/*.zip \
            artifacts/*-setup.exe \
            artifacts/*.tar.gz \
            artifacts/SHA256SUMS.txt \
            artifacts/*.asc

      - name: Print release URL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          URL=$(gh release view "${{ needs.prepare.outputs.tag }}" --json url -q .url)
          echo "Draft release: $URL"
          echo "## Draft release" >> "$GITHUB_STEP_SUMMARY"
          echo "$URL" >> "$GITHUB_STEP_SUMMARY"
